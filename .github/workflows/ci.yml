name: CI
on: [push, pull_request]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install -r requirements.txt
      - name: Smoke tests (env, models, all 5 planners)
        run: python tests/smoke_test.py
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build + smoke test inside container
        run: |
          docker build -t nwm .
          docker run --rm nwm python tests/smoke_test.py
